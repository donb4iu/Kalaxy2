name: Kalaxy2 automated documentation generation and publication
on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kalaxy2-main-writer
  cancel-in-progress: false

jobs:
  doc:
    environment:
      name: github-pages
      url: ${{ steps.pages_deployment.outputs.page_url }}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    runs-on: ubuntu-latest 

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      id: Detected_push
      with:
        fetch-depth: 0

    - name: Generate Daux webpages
      uses: addnab/docker-run-action@v3
      id: Generating_webpages_from_commit
      with:
        image: daux/daux.io:latest
        options: >-
          --rm
          -v ${{ github.workspace }}:/build
          -w /build
        run: |
          rm -rf docs
          /daux/bin/daux generate -s markdown -d docs
    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5          
    - name: Disable Jekyll processing
      run: touch docs/.nojekyll
    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: docs
        include-hidden-files: true
    - name: Deploy Kalaxy2 documentation
      id: pages_deployment
      uses: actions/deploy-pages@v4      
    - name: Commit generated documentation to Kalaxy2
      run: |
        git config --local user.email "dbuddenbaum@gmail.com"
        git config --local user.name "donb4iu"

        git add docs

        if git diff --cached --quiet; then
          echo "No generated documentation changes."
        else  
          git commit -m "Generate Kalaxy2 Daux documentation [skip ci]"
        fi

        echo "Working tree before synchronization:"
        git status --short

        # Documentation is already committed. Discard any unintended
        # tracked working-tree changes left by the build action.
        git restore --worktree .
        git pull --rebase origin main
        git push origin HEAD:main

    - name: Publish webpages to donb4iu.github.io
      uses: cpina/github-action-push-to-another-repository@main
      id: Publishing_to_gitpages
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source-directory: "docs"
        target-directory: "docs/Kalaxy2"
        destination-github-username: "donb4iu"
        destination-repository-name: "donb4iu.github.io"
        target-branch: "main"
        commit-message: "DauxIO webpage commit from Kalaxy2"
        user-email: "dbuddenbaum@gmail.com"
        user-name: "donb4iu"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      id: Logging_into_docker_hub
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Build and push image to donb4iu/mynginx_docs
      uses: docker/build-push-action@v6
      id: Build_and_Push_Docker_Image
      with:
          platforms: linux/amd64,linux/arm64
          file: yaml/nginx-docs/k8s-doc-to-nginx/nginx/Dockerfile          
          push: true
          tags: donb4iu/mynginx_docs:${{ github.sha }}

    - name: Update values.yaml
      id: Update_Helm_Values_File
      run: |
        cd yaml/nginx-docs/k8s-doc-to-nginx
        sed -i 's|APP_VERSION:.*|APP_VERSION: '${{ github.sha }}'|' values.yaml 
        git config --global user.name 'donb4iu'
        git config --global user.email 'dbuddenbaum@gmail.com'
        git add values.yaml
        if git diff --cached --quiet; then
          echo "values.yaml already contains the current application version."
        else
          git commit -m "Update values.yaml [skip ci]"
          git push
        fi

    - name: Send Slack message
      uses: act10ns/slack@v2
      with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
      if: always()

  resume:
      if: ${{ always() }}
      needs: [doc]
      env:
         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      runs-on: ubuntu-latest 
      steps:
      - uses: actions/checkout@v4
        id: Detected_push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        id: Logging_into_docker_hub
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push image to donb4iu/mynginx_resume
        uses: docker/build-push-action@v6
        id: Build_and_Push_Docker_Image
        with:
          platforms: linux/amd64,linux/arm64
          file: yaml/nginx-docs/k8s-resume-to-nginx/nginx/Dockerfile          
          push: true
          tags: donb4iu/mynginx_resume:${{ github.sha }}

      - name: Update values.yaml
        id: Update_Helm_Values_File
        run: |
          git config --global user.name 'donb4iu'
          git config --global user.email 'dbuddenbaum@gmail.com'
          git pull
          cd yaml/nginx-docs/k8s-resume-to-nginx
          sed -i 's|APP_VERSION:.*|APP_VERSION: '${{ github.sha }}'|' values.yaml 
          git add values.yaml
          git commit -m "Update values.yaml"
          git push

      - name: Send Slack message
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()

  shelloperator:
      if: ${{ always() }}
      needs: [doc, resume]
      env:
         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      runs-on: ubuntu-latest 
      steps:
      - uses: actions/checkout@v4
        id: Detected_push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        id: Logging_into_docker_hub
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push image to donb4iu/shell-operator-hooks
        uses: docker/build-push-action@v6
        id: Build_and_Push_Docker_Image
        with:
          platforms: linux/amd64,linux/arm64
          file: yaml/shell_operator/documentation_operator/Dockerfile       
          push: true
          tags: donb4iu/shell-operator-hooks:${{ github.sha }}

      - name: Update values.yaml
        id: Update_Helm_Values_File
        run: |
          git config --global user.name 'donb4iu'
          git config --global user.email 'dbuddenbaum@gmail.com'
          git pull
          cd yaml/shell_operator/documentation_operator
          sed -i 's|APP_VERSION:.*|APP_VERSION: '${{ github.sha }}'|' values.yaml 
          git add values.yaml
          git commit -m "Update values.yaml"
          git push

      - name: Send Slack message
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()