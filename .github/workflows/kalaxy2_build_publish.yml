name: Kalaxy2 automated documentation generation and publication
on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kalaxy2-main-writer
  cancel-in-progress: false

jobs:
  doc:
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    runs-on: ubuntu-latest 

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      id: Detected_push
      with:
        fetch-depth: 0

    - name: Generate Daux webpages
      uses: addnab/docker-run-action@v3
      id: Generating_webpages_from_commit
      with:
        image: daux/daux.io:latest
        options: >-
          --rm
          -v ${{ github.workspace }}:/build
          -w /build
        run: |
          rm -rf docs
          /daux/bin/daux generate -s markdown -d docs
    - name: Fix generated documentation permissions
      run: sudo chown -R "$(id -u):$(id -g)" docs         
  
    - name: Commit generated documentation to Kalaxy2
      run: |
        git config --local user.email "dbuddenbaum@gmail.com"
        git config --local user.name "donb4iu"

        git add docs

        if git diff --cached --quiet; then
          echo "No generated documentation changes."
        else  
          git commit -m "Generate Kalaxy2 Daux documentation [skip ci]"
        fi

        # Documentation is already committed. Discard any unintended
        # tracked working-tree changes left by the build action.
        git restore --worktree .
        git pull --rebase origin main
        git push origin HEAD:main

    - name: Publish webpages to donb4iu.github.io
      uses: cpina/github-action-push-to-another-repository@main
      id: Publishing_to_gitpages
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source-directory: "docs"
        target-directory: "docs/Kalaxy2"
        destination-github-username: "donb4iu"
        destination-repository-name: "donb4iu.github.io"
        target-branch: "main"
        commit-message: "DauxIO webpage commit from Kalaxy2"
        user-email: "dbuddenbaum@gmail.com"
        user-name: "donb4iu"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      id: Logging_into_docker_hub
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Build and push image to donb4iu/mynginx_docs
      uses: docker/build-push-action@v6
      id: Build_and_Push_Docker_Image
      with:
          platforms: linux/amd64,linux/arm64
          file: yaml/nginx-docs/k8s-doc-to-nginx/nginx/Dockerfile          
          push: true
          tags: donb4iu/mynginx_docs:${{ github.sha }}

    - name: Update values.yaml
      id: Update_Helm_Values_File
      run: |
        cd yaml/nginx-docs/k8s-doc-to-nginx

        sed -i \
          's|APP_VERSION:.*|APP_VERSION: ${{ github.sha }}|' \
          values.yaml

        git config --global user.name "donb4iu"
        git config --global user.email "dbuddenbaum@gmail.com"

        git add values.yaml

        if git diff --cached --quiet; then
          echo "values.yaml already contains the current application version."
        else
          git commit -m "Update values.yaml [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
        fi

    - name: Send Slack message
      uses: act10ns/slack@v2
      with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
      if: always()

